# Japan-specific translation keys:
# - sources.mofa: MOFA overseas safety information intended mainly for Japanese users.
# - sources.p2pquake / types.* / p2pquake.* / scales.* / tsunami-*:
#   Japan-focused earthquake, tsunami, EEW, seismic intensity, and prefecture-related wording.
# RSS/Atom feed names and article bodies are not translated by this file.

common:
  enabled: "활성화됨"
  disabled: "비활성화됨"
  unknown: "알 수 없음"

commands:
  provider-count: "NewsFlash 제공자: {count}"
  provider-schedule: "- {name}: {initialDelaySeconds}초 후 첫 확인, 이후 {pollIntervalMinutes}분마다"
  p2p-status: "- P2PQuake: {enabled}, 지진 최소 진도 {minScale}, 쓰나미 {tsunami}, 긴급지진속보 {eew}"
  rss-status: "- RSS/Atom: {enabled}, 피드 {feedCount}"
  rss-feed-status: "  - {id}: {enabled}, 필터 {filter}"
  reloaded: "NewsFlash를 다시 불러왔습니다."
  reloaded-target: "NewsFlash를 다시 불러왔습니다: {target}"
  unknown-reload-target: "알 수 없는 NewsFlash 다시 불러오기 대상입니다: {target}"
  check-started: "NewsFlash 확인을 시작했습니다."
