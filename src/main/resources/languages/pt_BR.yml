# Japan-specific translation keys:
# - sources.mofa: MOFA overseas safety information intended mainly for Japanese users.
# - sources.p2pquake / types.* / p2pquake.* / scales.* / tsunami-*:
#   Japan-focused earthquake, tsunami, EEW, seismic intensity, and prefecture-related wording.
# RSS/Atom feed names and article bodies are not translated by this file.

common:
  enabled: "ativado"
  disabled: "desativado"
  unknown: "desconhecido"

commands:
  provider-count: "&bProvedores do NewsFlash: &6{count}&b"
  provider-schedule: "&b- {name}: primeira verificação após {initialDelaySeconds} segundo(s), depois a cada {pollIntervalMinutes} minuto(s)"
  p2p-status: "&b- P2PQuake: {enabled}, intensidade sísmica mínima {minScale}, tsunami {tsunami}, EEW {eew}"
  rss-status: "&b- RSS/Atom: {enabled}, feeds &6{feedCount}&b"
  rss-feed-status: "&b  - {id}: {enabled}, filtro {filter}"
  reloaded: "&aNewsFlash recarregado."
  reloaded-target: "&aNewsFlash recarregado: &6{target}&a"
  unknown-reload-target: "&cDestino de recarregamento do NewsFlash desconhecido: &6{target}&c"
  check-started: "&aVerificação do NewsFlash iniciada."
  check-started-target: "&aVerificação do NewsFlash iniciada: &6{target}&a"
  unknown-check-target: "&cDestino de verificação do NewsFlash desconhecido ou não suportado: &6{target}&c"
  language-current: "&bIdioma padrão: &6{default}&b / Idioma pessoal: &6{personal}&b"
  language-default-changed: "&aIdioma padrão alterado para &6{language}&a."
  language-personal-changed: "&aIdioma pessoal alterado para &6{language}&a."
  language-personal-cleared: "&aIdioma pessoal removido; usando o idioma padrão."
  language-console-personal-unsupported: "&cO idioma pessoal só pode ser definido por um jogador."
  language-unknown: "&cIdioma não suportado: &6{language}&c / Idiomas suportados: &6{languages}&c"
  language-list: "&bIdiomas suportados: &6{languages}&b"
  no-permission: "&cVocê não tem permissão para executar este comando."

sources:
  mofa: "Informações de segurança no exterior do MOFA"
  p2pquake: "P2PQuake"

types:
  quake: "Terremoto"
  tsunami: "Previsão de tsunami"
  eew: "Alerta precoce de terremoto"

p2pquake:
  quake-title: "Terremoto: intensidade máxima {scale} {hypocenter}"
  quake-lead: "Horário: {time} / M{magnitude} / Profundidade {depth} / Tsunami: {tsunami}{targetAreaText}"
  tsunami-title: "Tsunami: {grade}"
  target-areas: "Áreas-alvo: {areas}"
  eew-title: "Alerta precoce de terremoto: {hypocenter}"
  eew-lead: "Boletim {serial} / Intensidade máxima prevista {scale} / M{magnitude} / Profundidade {depth}{areaText}"
  target-area-max-scale: " / Intensidade máxima na área-alvo: {scale}"
  target-area-list: " / Áreas-alvo: {areas}"
  matched-max-scale: "Intensidade máxima {scale}"
  matched-target-max-scale: "Intensidade máxima na área-alvo {scale}"
  area-scale: "{pref} {area} intensidade {scale}"
  unknown-hypocenter: "Hipocentro desconhecido"
  unknown-area: "Área desconhecida"
  depth: "{depth}km"

scales:
  10: "1"
  20: "2"
  30: "3"
  40: "4"
  45: "5 fraco"
  46: "5 fraco ou superior"
  50: "5 forte"
  55: "6 fraco"
  60: "6 forte"
  70: "7"
  99: "ou superior"

tsunami-status:
  None: "Nenhum"
  Checking: "Verificando"
  NonEffective: "Pequenas alterações no nível do mar"
  Watch: "Aviso de tsunami"
  Warning: "Alerta de tsunami"

tsunami-grades:
  MajorWarning: "Alerta de tsunami de grande magnitude"
  Warning: "Alerta de tsunami"
  Watch: "Aviso de tsunami"
