  target-area-max-scale: " / 目標地區最大震度: {scale}"
  target-area-list: " / 目標地區: {areas}"
  matched-max-scale: "最大震度 {scale}"
  matched-target-max-scale: "目標地區最大震度 {scale}"
  area-scale: "{pref} {area} 震度 {scale}"
  unknown-hypocenter: "震源未知"
  unknown-area: "未知地區"
  depth: "{depth}km"

