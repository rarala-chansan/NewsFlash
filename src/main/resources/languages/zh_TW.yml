# Japan-specific translation keys:
# - sources.mofa: MOFA overseas safety information intended mainly for Japanese users.
# - sources.p2pquake / types.* / p2pquake.* / scales.* / tsunami-*:
#   Japan-focused earthquake, tsunami, EEW, seismic intensity, and prefecture-related wording.
# RSS/Atom feed names and article bodies are not translated by this file.

common:
  enabled: "已啟用"
  disabled: "已停用"
  unknown: "未知"

commands:
  provider-count: "&bNewsFlash 提供來源: &6{count}&b"
  provider-schedule: "&b- {name}: {initialDelaySeconds} 秒後首次檢查，之後每 {pollIntervalMinutes} 分鐘檢查一次"
  p2p-status: "&b- P2PQuake: {enabled}, 地震最低震度 {minScale}, 海嘯 {tsunami}, 緊急地震速報 {eew}"
  rss-status: "&b- RSS/Atom: {enabled}, 訂閱來源 &6{feedCount}&b"
  rss-feed-status: "&b  - {id}: {enabled}, 篩選器 {filter}"
  reloaded: "&aNewsFlash 已重新載入。"
  reloaded-target: "&aNewsFlash 已重新載入: &6{target}&a"
  unknown-reload-target: "&c未知的 NewsFlash 重新載入目標: &6{target}&c"
  check-started: "&aNewsFlash 檢查已開始。"
  check-started-target: "&aNewsFlash 檢查已開始: &6{target}&a"
  unknown-check-target: "&c未知或不支援的 NewsFlash 檢查目標: &6{target}&c"
  language-current: "&b預設語言: &6{default}&b / 個人語言: &6{personal}&b"
  language-default-changed: "&a預設語言已變更為 &6{language}&a。"
  language-personal-changed: "&a個人語言已變更為 &6{language}&a。"
  language-personal-cleared: "&a個人語言已清除；將使用預設語言。"
  language-console-personal-unsupported: "&c個人語言只能由玩家設定。"
  language-unknown: "&c不支援的語言: &6{language}&c / 支援的語言: &6{languages}&c"
  language-list: "&b支援的語言: &6{languages}&b"
  no-permission: "&c你沒有權限執行此命令。"

sources:
