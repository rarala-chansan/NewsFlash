# Japan-specific translation keys:
# - sources.mofa: MOFA overseas safety information intended mainly for Japanese users.
# - sources.p2pquake / types.* / p2pquake.* / scales.* / tsunami-*:
#   Japan-focused earthquake, tsunami, EEW, seismic intensity, and prefecture-related wording.
# RSS/Atom feed names and article bodies are not translated by this file.

common:
  enabled: "已啟用"
  disabled: "已停用"
  unknown: "未知"

commands:
  provider-count: "NewsFlash 提供來源: {count}"
  provider-schedule: "- {name}: {initialDelaySeconds} 秒後首次檢查，之後每 {pollIntervalMinutes} 分鐘檢查一次"
  p2p-status: "- P2PQuake: {enabled}, 地震最低震度 {minScale}, 海嘯 {tsunami}, 緊急地震速報 {eew}"
  rss-status: "- RSS/Atom: {enabled}, 訂閱來源 {feedCount}"
  rss-feed-status: "  - {id}: {enabled}, 篩選器 {filter}"
  reloaded: "NewsFlash 已重新載入。"
  reloaded-target: "NewsFlash 已重新載入: {target}"
  unknown-reload-target: "未知的 NewsFlash 重新載入目標: {target}"
  check-started: "NewsFlash 檢查已開始。"
  check-started-target: "NewsFlash 檢查已開始: {target}"
  unknown-check-target: "未知或不支援的 NewsFlash 檢查目標: {target}"
  language-current: "預設語言: {default} / 個人語言: {personal}"
  language-default-changed: "預設語言已變更為 {language}。"
  language-personal-changed: "個人語言已變更為 {language}。"
  language-personal-cleared: "個人語言已清除；將使用預設語言。"
