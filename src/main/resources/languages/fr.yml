# Japan-specific translation keys:
# - sources.mofa: MOFA overseas safety information intended mainly for Japanese users.
# - sources.p2pquake / types.* / p2pquake.* / scales.* / tsunami-*:
#   Japan-focused earthquake, tsunami, EEW, seismic intensity, and prefecture-related wording.
# RSS/Atom feed names and article bodies are not translated by this file.

common:
  enabled: "activé"
  disabled: "désactivé"
  unknown: "inconnu"

commands:
  provider-count: "Fournisseurs NewsFlash : {count}"
  provider-schedule: "- {name} : première vérification après {initialDelaySeconds} seconde(s), puis toutes les {pollIntervalMinutes} minute(s)"
  p2p-status: "- P2PQuake : {enabled}, intensité sismique minimale {minScale}, tsunami {tsunami}, EEW {eew}"
  rss-status: "- RSS/Atom : {enabled}, flux {feedCount}"
  rss-feed-status: "  - {id} : {enabled}, filtre {filter}"
  reloaded: "NewsFlash a été rechargé."
  reloaded-target: "NewsFlash a été rechargé : {target}"
  unknown-reload-target: "Cible de rechargement NewsFlash inconnue : {target}"
  check-started: "La vérification NewsFlash a démarré."
  check-started-target: "La vérification NewsFlash a démarré : {target}"
  unknown-check-target: "Cible de vérification NewsFlash inconnue ou non prise en charge : {target}"
  language-current: "Langue par défaut : {default} / Langue personnelle : {personal}"
  language-default-changed: "Langue par défaut changée en {language}."
  language-personal-changed: "Langue personnelle changée en {language}."
  language-personal-cleared: "Langue personnelle effacée ; la langue par défaut sera utilisée."
  language-console-personal-unsupported: "La langue personnelle ne peut être définie que par un joueur."
  language-unknown: "Langue non prise en charge : {language} / Langues prises en charge : {languages}"
  language-list: "Langues prises en charge : {languages}"
  no-permission: "Vous n'avez pas la permission d'exécuter cette commande."

sources:
  mofa: "Informations de sécurité à l’étranger du MOFA"
  p2pquake: "P2PQuake"

types:
  quake: "Séisme"
  tsunami: "Prévision de tsunami"
  eew: "Alerte précoce de séisme"

p2pquake:
  quake-title: "Séisme : intensité maximale {scale} {hypocenter}"
  quake-lead: "Heure : {time} / M{magnitude} / Profondeur {depth} / Tsunami : {tsunami}{targetAreaText}"
  tsunami-title: "Tsunami : {grade}"
  target-areas: "Zones concernées : {areas}"
  eew-title: "Alerte précoce de séisme : {hypocenter}"
  eew-lead: "Bulletin {serial} / Intensité maximale prévue {scale} / M{magnitude} / Profondeur {depth}{areaText}"
  target-area-max-scale: " / Intensité maximale dans la zone concernée : {scale}"
  target-area-list: " / Zones concernées : {areas}"
  matched-max-scale: "Intensité maximale {scale}"
  matched-target-max-scale: "Intensité maximale dans la zone concernée {scale}"
  area-scale: "{pref} {area} intensité {scale}"
  unknown-hypocenter: "Hypocentre inconnu"
  unknown-area: "Zone inconnue"
  depth: "{depth}km"

