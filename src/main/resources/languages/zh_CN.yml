# Japan-specific translation keys:
# - sources.mofa: MOFA overseas safety information intended mainly for Japanese users.
# - sources.p2pquake / types.* / p2pquake.* / scales.* / tsunami-*:
#   Japan-focused earthquake, tsunami, EEW, seismic intensity, and prefecture-related wording.
# RSS/Atom feed names and article bodies are not translated by this file.

common:
  enabled: "已启用"
  disabled: "已禁用"
  unknown: "未知"

commands:
  provider-count: "&bNewsFlash 提供源: &6{count}&b"
  provider-schedule: "&b- {name}: {initialDelaySeconds} 秒后首次检查，之后每 {pollIntervalMinutes} 分钟检查一次"
  p2p-status: "&b- P2PQuake: {enabled}, 地震最低震度 {minScale}, 海啸 {tsunami}, 紧急地震速报 {eew}"
  rss-status: "&b- RSS/Atom: {enabled}, 订阅源 &6{feedCount}&b"
  rss-feed-status: "&b  - {id}: {enabled}, 过滤器 {filter}"
  reloaded: "&aNewsFlash 已重新加载。"
  reloaded-target: "&aNewsFlash 已重新加载: &6{target}&a"
  unknown-reload-target: "&c未知的 NewsFlash 重新加载目标: &6{target}&c"
  check-started: "&aNewsFlash 检查已开始。"
  check-started-target: "&aNewsFlash 检查已开始: &6{target}&a"
  unknown-check-target: "&c未知或不受支持的 NewsFlash 检查目标: &6{target}&c"
  language-current: "&b默认语言: &6{default}&b / 个人语言: &6{personal}&b"
  language-default-changed: "&a默认语言已更改为 &6{language}&a。"
  language-personal-changed: "&a个人语言已更改为 &6{language}&a。"
  language-personal-cleared: "&a个人语言已清除；将使用默认语言。"
  language-console-personal-unsupported: "&c个人语言只能由玩家设置。"
  language-unknown: "&c不支持的语言: &6{language}&c / 支持的语言: &6{languages}&c"
  language-list: "&b支持的语言: &6{languages}&b"
  no-permission: "&c你没有权限执行此命令。"

