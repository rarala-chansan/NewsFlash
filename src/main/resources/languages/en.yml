# Japan-specific translation keys:
# - sources.mofa: MOFA overseas safety information intended mainly for Japanese users.
# - sources.p2pquake / types.* / p2pquake.* / scales.* / tsunami-*:
#   Japan-focused earthquake, tsunami, EEW, seismic intensity, and prefecture-related wording.
# RSS/Atom feed names and article bodies are not translated by this file.

common:
  enabled: "enabled"
  disabled: "disabled"
  unknown: "unknown"

commands:
  provider-count: "&bNewsFlash providers: &6{count}&b"
  provider-schedule: "&b- {name}: first check after {initialDelaySeconds} second(s), then every {pollIntervalMinutes} minute(s)"
  p2p-status: "&b- P2PQuake: {enabled}, earthquake min scale {minScale}, tsunami {tsunami}, eew {eew}"
  rss-status: "&b- RSS/Atom: {enabled}, feeds &6{feedCount}&b"
  rss-feed-status: "&b  - {id}: {enabled}, filter {filter}"
  reloaded: "&aNewsFlash reloaded."
  reloaded-target: "&aNewsFlash reloaded: &6{target}&a"
  unknown-reload-target: "&cUnknown NewsFlash reload target: &6{target}&c"
  check-started: "&aNewsFlash check started."
  check-started-target: "&aNewsFlash check started: &6{target}&a"
  unknown-check-target: "&cUnknown or unsupported NewsFlash check target: &6{target}&c"
  check-finished: "&a{provider} check finished. New items: &6{count}&a."
  check-failed: "&c{provider} check failed: &6{error}&c"
  broadcast-example-sent: "&aExample notification broadcasted."
  language-current: "&bDefault language: &6{default}&b / Personal language: &6{personal}&b"
  language-default-changed: "&aDefault language changed to &6{language}&a."
  language-personal-changed: "&aPersonal language changed to &6{language}&a."
  language-personal-cleared: "&aPersonal language cleared; using the default language."
  language-console-personal-unsupported: "&cPersonal language can only be set by a player."
  language-unknown: "&cUnsupported language: &6{language}&c / Supported languages: &6{languages}&c"
  language-list: "&bSupported languages: &6{languages}&b"
  no-permission: "&cYou do not have permission to run this command."

sources:
  mofa: "MOFA Overseas Safety"
  p2pquake: "P2PQuake"

types:
  quake: "Earthquake"
  tsunami: "Tsunami Forecast"
  eew: "Emergency Earthquake Warning"

p2pquake:
  quake-title: "Earthquake: Max intensity {scale} {hypocenter}"
  quake-lead: "Time: {time} / M{magnitude} / Depth {depth} / Tsunami: {tsunami}{targetAreaText}"
  tsunami-title: "Tsunami: {grade}"
  target-areas: "Target areas: {areas}"
  eew-title: "Emergency Earthquake Warning: {hypocenter}"
  eew-lead: "Report {serial} / Max predicted intensity {scale} / M{magnitude} / Depth {depth}{areaText}"
  target-area-max-scale: " / Target-area max intensity: {scale}"
  target-area-list: " / Target areas: {areas}"
  matched-max-scale: "Max intensity {scale}"
  matched-target-max-scale: "Target-area max intensity {scale}"
  area-scale: "{pref} {area} intensity {scale}"
  unknown-hypocenter: "Unknown hypocenter"
  unknown-area: "Unknown area"
  depth: "{depth}km"

scales:
  10: "1"
  20: "2"
  30: "3"
  40: "4"
  45: "5 lower"
  46: "5 lower or higher"
  50: "5 upper"
  55: "6 lower"
  60: "6 upper"
  70: "7"
  99: "or higher"

tsunami-status:
  None: "None"
  Checking: "Checking"
  NonEffective: "Minor sea-level changes"
  Watch: "Tsunami Advisory"
  Warning: "Tsunami Warning"

tsunami-grades:
  MajorWarning: "Major Tsunami Warning"
  Warning: "Tsunami Warning"
  Watch: "Tsunami Advisory"
