# Claves de traducción específicas de Japón:
# - sources.mofa: información de seguridad en el extranjero de MOFA destinada principalmente a usuarios japoneses.
# - sources.p2pquake / types.* / p2pquake.* / scales.* / tsunami-*:
#   textos sobre terremotos, tsunamis, alertas EEW, intensidad sísmica y prefecturas de Japón.
# Los nombres de feeds RSS/Atom y el contenido de los artículos no se traducen con este archivo.

common:
  enabled: "activado"
  disabled: "desactivado"
  unknown: "desconocido"

commands:
  provider-count: "&bFuentes de NewsFlash: &6{count}&b"
  provider-schedule: "&b- {name}: primera comprobación tras {initialDelaySeconds} segundo(s), luego cada {pollIntervalMinutes} minuto(s)"
  p2p-status: "&b- P2PQuake: {enabled}, intensidad mínima de terremoto {minScale}, tsunami {tsunami}, EEW {eew}"
  rss-status: "&b- RSS/Atom: {enabled}, feeds &6{feedCount}&b"
  rss-feed-status: "&b  - {id}: {enabled}, filtro {filter}"
  reloaded: "&aNewsFlash recargado."
  reloaded-target: "&aNewsFlash recargado: &6{target}&a"
  unknown-reload-target: "&cDestino de recarga desconocido: &6{target}&c"
  check-started: "&aComprobación de NewsFlash iniciada."
  check-started-target: "&aComprobación de NewsFlash iniciada: &6{target}&a"
  unknown-check-target: "&cDestino de comprobación desconocido o no compatible: &6{target}&c"
  language-current: "&bIdioma predeterminado: &6{default}&b / Idioma personal: &6{personal}&b"
  language-default-changed: "&aIdioma predeterminado cambiado a &6{language}&a."
  language-personal-changed: "&aIdioma personal cambiado a &6{language}&a."
  language-personal-cleared: "&aIdioma personal eliminado; se usará el idioma predeterminado."
  language-console-personal-unsupported: "&cEl idioma personal solo puede configurarlo un jugador."
  language-unknown: "&cIdioma no compatible: &6{language}&c / Idiomas compatibles: &6{languages}&c"
  language-list: "&bIdiomas compatibles: &6{languages}&b"
  no-permission: "&cNo tienes permiso para ejecutar este comando."

sources:
  mofa: "Seguridad en el extranjero de MOFA"
  p2pquake: "P2PQuake"

types:
  quake: "Información de terremoto"
  tsunami: "Pronóstico de tsunami"
  eew: "Alerta temprana de terremoto"

p2pquake:
  quake-title: "Terremoto: intensidad máxima {scale} {hypocenter}"
  quake-lead: "Hora: {time} / M{magnitude} / Profundidad {depth} / Tsunami: {tsunami}{targetAreaText}"
  tsunami-title: "Tsunami: {grade}"
  target-areas: "Áreas objetivo: {areas}"
  eew-title: "Alerta temprana de terremoto: {hypocenter}"
  eew-lead: "Informe {serial} / intensidad máxima prevista {scale} / M{magnitude} / profundidad {depth}{areaText}"
  target-area-max-scale: " / Intensidad máxima en el área objetivo: {scale}"
  target-area-list: " / Áreas objetivo: {areas}"
  matched-max-scale: "Intensidad máxima {scale}"
  matched-target-max-scale: "Intensidad máxima en el área objetivo {scale}"
  area-scale: "{pref} {area} intensidad {scale}"
  unknown-hypocenter: "Hipocentro desconocido"
  unknown-area: "Área desconocida"
  depth: "{depth}km"

scales:
  10: "1"
  20: "2"
  30: "3"
  40: "4"
  45: "5 inferior"
  46: "5 inferior o superior"
  50: "5 superior"
  55: "6 inferior"
  60: "6 superior"
  70: "7"
  99: "o superior"

tsunami-status:
  None: "Ninguno"
  Checking: "En comprobación"
  NonEffective: "Cambios menores del nivel del mar"
  Watch: "Aviso de tsunami"
  Warning: "Alerta de tsunami"

tsunami-grades:
  MajorWarning: "Alerta de gran tsunami"
  Warning: "Alerta de tsunami"
  Watch: "Aviso de tsunami"
