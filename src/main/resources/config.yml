# NewsFlash configuration / NewsFlash 設定

translation:
  # Plugin UI language. Article bodies stay in the source language.
  # 表示言語です。記事本文は配信元の原文のままです。
  # ja, en, zh_CN, zh_TW, ko, de, fr, es, pt_BR, ru
  language: "ja"

storage:
  # Personal setting storage: yaml or sqlite.
  # 個人設定の保存方式: yaml または sqlite。
  type: "yaml"

mofa:
  # MOFA Overseas Safety open data. Mainly for Japanese users.
  # 外務省 海外安全情報オープンデータ。主に日本人向けです。
  enabled: true

  # First fetch delay after startup, in seconds.
  # 起動後、初回取得までの秒数。
  initial-delay-seconds: 60

  # Fetch interval in minutes.
  # 取得間隔（分）。
  poll-interval-minutes: 5

  # MOFA new-arrivals XML URL.
  # 外務省 新着情報XMLのURL。
  url: "https://www.ezairyu.mofa.go.jp/opendata/area/newarrivalL.xml"

  # Network timeout in seconds.
  # 通信タイムアウト（秒）。
  timeout-seconds: 15

  # On first fetch, mark existing items as seen without broadcasting.
  # 初回取得時、既存項目は通知せず既読登録のみ行います。
  suppress-initial-broadcast: true

  # Max items to broadcast per fetch.
  # 1回の取得で通知する最大件数。
  max-broadcast-per-poll: 5

  # Max seen IDs to keep.
  # 既読IDの保持上限。
  seen-history-limit: 1000

  filter:
    # MOFA-only keyword filter. false broadcasts all MOFA items.
    # 外務省専用のキーワードフィルター。false なら全件通知。
    enabled: true

    # Match target: title + lead + type.
    # 判定対象: title + lead + type。
    keywords:
      - "ミサイル"
      - "攻撃"
      - "空爆"
      - "戦闘"
      - "爆発"
      - "感染"
      - "アウトブレイク"
      - "暗殺"
      - "地震"
      - "津波"
      - "戦争"

p2pquake:
  # P2PQuake realtime earthquake, tsunami, and EEW data.
  # P2P地震情報の地震・津波・緊急地震速報を受信します。
  enabled: true

  # WebSocket URL.
  # WebSocket URL。
  websocket-url: "wss://api.p2pquake.net/v2/ws"

  # Reconnect delay in seconds.
  # 再接続までの秒数。
  reconnect-delay-seconds: 10

  # Max seen IDs to keep.
  # 受信済みIDの保持上限。
  seen-history-limit: 1000

  earthquake:
    # Broadcast earthquake information.
    # 地震情報を通知します。
    enabled: true

    # Minimum intensity: 40=4, 45=5 lower, 50=5 upper, 55=6 lower, 60=6 upper, 70=7.
    # 最小震度: 40=4, 45=5弱, 50=5強, 55=6弱, 60=6強, 70=7。
    min-scale: 40

    # If enabled is false, all Japan is targeted.
    # enabled: false なら全国対象です。
    target-prefectures:
      enabled: false
      list:
        # - "東京都"
        # - "神奈川県"

    # Broadcast unknown maximum intensity.
    # 最大震度不明も通知します。
    include-unknown-scale: false

  tsunami:
    # Broadcast tsunami advisories/warnings.
    # 津波注意報・警報を通知します。
    enabled: true

  eew:
    # Broadcast Emergency Earthquake Warnings.
    # 緊急地震速報を通知します。
    enabled: true

    # Broadcast test messages.
    # テスト配信も通知します。
    include-tests: false

rss:
  # Custom RSS/Atom feeds. Disabled by default because source terms differ.
  # 任意のRSS/Atom。配信元の規約が異なるためデフォルト無効です。
  enabled: false

  # First fetch delay after startup, in seconds.
  # 起動後、初回取得までの秒数。
  initial-delay-seconds: 60

  # Fetch interval in minutes.
  # 取得間隔（分）。
  poll-interval-minutes: 10

  # Network timeout in seconds.
  # 通信タイムアウト（秒）。
  timeout-seconds: 15

  # Max items to broadcast per fetch.
  # 1回の取得で通知する最大件数。
  max-broadcast-per-poll: 5

  # Max seen IDs to keep.
  # 既読IDの保持上限。
  seen-history-limit: 1000

  feeds:
    # Add your own feed URLs. filter.enabled=false broadcasts all new items.
    # URLは各自で設定してください。filter.enabled=false なら新着を全件通知。
    #
    # - id: "example"
    #   name: "Example News"
    #   url: "https://example.com/rss.xml"
    #   enabled: true
    #   filter:
    #     enabled: false
    #     keywords:
    #       - "地震"
    #       - "警報"

broadcast:
  # Prefix. MiniMessage is supported.
  # 接頭辞。MiniMessage対応。
  prefix: "<red><bold>[NewsFlash]</bold></red>"

  # Chat format. Placeholders: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}
  # チャット形式。置換: {prefix}, {source}, {type}, {title}, {lead}, {keyword}, {date}, {url}
  format: "{prefix} <gold>{source}</gold> <yellow>{title}</yellow> <gray>({date})</gray> <aqua><click:open_url:'{url}'>{url}</click></aqua>"

  # Also log broadcasts to console.
  # 通知をコンソールにも出力。
  console: true

  chat:
    # Send normal chat messages.
    # 通常チャットへ通知。
    enabled: false

  actionbar:
    # Scrolling actionbar ticker.
    # アクションバーの横スクロール通知。
    enabled: false
    format: "{prefix} <yellow>{ticker}</yellow>"

  bossbar:
    # Scrolling bossbar ticker. color/overlay use Adventure names.
    # ボスバーの横スクロール通知。color/overlay は Adventure 名です。
    enabled: true
    format: "{prefix} <yellow>{ticker}</yellow>"
    color: "YELLOW"
    overlay: "NOTCHED_20"
    progress: 1.0

  ticker:
    # Shared ticker settings. width is display width. 20 ticks = 1 second.
    # 共通スクロール設定。width は表示幅です。20 ticks = 1秒。
    width: 48
    interval-ticks: 4
    duration-seconds: 18
    separator: "   "
    pad-character: " "
